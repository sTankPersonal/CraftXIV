{% if query and not results %}
    <p class="empty-state">No items found for "{{ query }}".</p>
{% elif results %}
    <ul class="search-results-list">
        {% for result in results %}
            <li class="search-result-row">
                <span class="search-result-name">{{ result.name }}</span>
                <div class="search-result-actions">
                    <details class="popover-toggle">
                        <summary class="btn-outline" title="Actions">&#9776;</summary>
                        <div class="popover-panel">
                            <a class="btn-outline" href="{{ url_for('items.detail', game_id=result.id) }}">View</a>
                            {% if user_lists %}
                                <form method="post" action="{{ url_for('items.add_to_list', game_id=result.id) }}" class="inline-form">
                                    <input type="hidden" name="source" value="search">
                                    <input type="hidden" name="q" value="{{ query }}">
                                    <select name="list_id" required>
                                        {% for crafting_list in user_lists %}
                                            <option value="{{ crafting_list.id }}">{{ crafting_list.name }}</option>
                                        {% endfor %}
                                    </select>
                                    <input type="number" name="quantity" value="1" min="1" required>
                                    <button type="submit">Add</button>
                                </form>
                            {% else %}
                                <a class="btn-outline" href="{{ url_for('lists.collection') }}">Create a list</a>
                            {% endif %}
                            <button type="button" class="btn-outline popover-cancel" onclick="this.closest('details').removeAttribute('open')">Cancel</button>
                        </div>
                    </details>
                </div>
            </li>
        {% endfor %}
    </ul>
{% endif %}
