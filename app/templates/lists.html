{% extends "base.html" %}

{% block title %}My Lists - CraftXIV{% endblock %}

{% block content %}
    <h1>My Lists</h1>

    <form method="post" action="{{ url_for('lists.collection') }}" class="inline-form">
        <input type="text" name="name" placeholder="New list name" required>
        <button type="submit">Create list</button>
    </form>

    {% if lists %}
        <ul class="lists-index">
            {% for crafting_list in lists %}
                <li class="lists-index-row">
                    <a href="{{ url_for('lists.detail', list_id=crafting_list.id) }}">{{ crafting_list.name }}</a>
                    <details class="popover-toggle">
                        <summary class="btn-outline" title="Actions">&#9776;</summary>
                        <div class="popover-panel">
                            <form method="post" action="{{ url_for('lists.rename', list_id=crafting_list.id) }}" class="inline-form">
                                <input type="text" name="name" value="{{ crafting_list.name }}" required>
                                <button type="submit">Rename</button>
                            </form>
                            <form method="post" action="{{ url_for('lists.delete', list_id=crafting_list.id) }}"
                                  class="inline-form" onsubmit="return confirm('Delete this list?');">
                                <button type="submit" class="danger">Delete list</button>
                            </form>
                        </div>
                    </details>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p class="empty-state">You don't have any crafting lists yet.</p>
    {% endif %}
{% endblock %}
